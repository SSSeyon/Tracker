        /* 3D Flip Effects */

            100% { transform: translateY(0px) rotate(0deg); opacity: 0.6; }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(-5%); }
            50% { transform: translateY(0); }
        }
        .animate-bounce-slow { animation: bounce-slow 2s infinite; }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }

        .animate-pop { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes wave {

            30%  { transform: translateX(8px) rotate(2deg); }
            45%  { transform: translateX(-6px) rotate(-1deg); }

            75%  { transform: translateX(-3px); }

        }

                X: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,

                Award: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>,

                Search: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
                Download: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
                Upload: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>,
                RotateCcw: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
                FileJson: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M10 12h.01"/><path d="M14 12h.01"/><path d="M10 16h.01"/><path d="M14 16h.01"/></svg>,
                Palette: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>,
                Edit: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>,
                BarChart: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
                Save: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            };
            return icons[name] || null;
        };

        // --- INDEXEDDB HELPER ---
        const DB_NAME = 'LittleLinguistDB';
        const STORE_NAME = 'audio_files';
        const DB_VERSION = 1;

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = (event) => reject(event.target.error);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
                };
                request.onsuccess = (event) => resolve(event.target.result);
            });
        };

        const saveAudioBlob = async (id, blob) => {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.put(blob, id);
                request.onsuccess = () => resolve();
                request.onerror = (e) => reject(e);
            });
        };

        const getAudioBlob = async (id) => {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get(id);
                request.onsuccess = (event) => resolve(event.target.result);
                request.onerror = (e) => reject(e);
            });
        };

        const getAllAudioEntries = async () => {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.getAllKeys();
                request.onsuccess = async () => {
                    const keys = request.result;
                    if (keys.length === 0) resolve({});
                    const entries = {};
                    let processed = 0;
                    for (const key of keys) {
                        const blobReq = store.get(key);
                        blobReq.onsuccess = (e) => {
                            entries[key] = e.target.result;
                            processed++;
                            if (processed === keys.length) resolve(entries);
                        }
                    }
                };
                request.onerror = reject;
            });
        };

        const blobToBase64 = (blob) => {
          return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(blob);
          });
        };

        const base64ToBlob = async (base64Data) => {
          const res = await fetch(base64Data);
          return await res.blob();
        };

        // Generate a short hash of a base64 string for change detection
        const hashString = async (str) => {
            const bytes = new TextEncoder().encode(str.slice(0, 2000)); // sample first 2KB for speed
            const buf = await crypto.subtle.digest('SHA-256', bytes);
            return Array.from(new Uint8Array(buf)).slice(0, 6).map(b => b.toString(16).padStart(2,'0')).join('');
        };

        // Write blobs to IndexedDB in parallel batches of 20
        const batchSaveAudio = async (entries) => {
            const keys = Object.keys(entries);
            const BATCH = 20;
            for (let i = 0; i < keys.length; i += BATCH) {
                await Promise.all(
                    keys.slice(i, i + BATCH).map(async (key) => {
                        const blob = await base64ToBlob(entries[key].data);
                        await saveAudioBlob(key, blob);
                    })
                );
            }
        };

        const REMOTE_WORDS_URL = 'https://ssseyon.github.io/Gungbe-Yor/words.json';
        const REMOTE_VERSION_URL = 'https://ssseyon.github.io/Gungbe-Yor/version.json';

        // Compare two semver strings like "1.2.3". Returns true if b is newer than a.
        const isNewer = (a, b) => {
            const pa = String(a).split('.').map(Number);
            const pb = String(b).split('.').map(Number);
            for (let i = 0; i < 3; i++) {
                if ((pb[i] || 0) > (pa[i] || 0)) return true;
                if ((pb[i] || 0) < (pa[i] || 0)) return false;
            }
            return false;
        };

        // Increment version: "1.2.3" -> "1.3.0"
        const incrementVersion = (v) => {
            const parts = String(v || '1.0.0').split('.').map(Number);
            return '1.' + (parts[1] + 1) + '.0';
        };

        // --- INITIAL DATA ---
        const INITIAL_DATA = [
            { id: '1', category: 'Animals', english: 'Dog', yoruba: 'Ajá', gungbe: 'Ovun', icon: '🐶' },
            { id: '2', category: 'Animals', english: 'Cat', yoruba: 'Ológbò', gungbe: 'Ase', icon: '🐱' },
            { id: '3', category: 'Animals', english: 'Cow', yoruba: 'Malúù', gungbe: 'Eni', icon: '🐮' },
            { id: '56', category: 'Food', english: 'Apple', yoruba: 'Àpù', gungbe: 'Apu', icon: '🍎' },
            { id: '57', category: 'Food', english: 'Banana', yoruba: 'Ọ̀gẹ̀dẹ̀', gungbe: 'Kókóe', icon: '🍌' },
            { id: '265', category: 'Colors', english: 'Red', yoruba: 'Pupa', gungbe: 'Fefe', icon: '🔴' },
            { id: '266', category: 'Colors', english: 'Blue', yoruba: 'Àwọ̀ oju orun', gungbe: 'Juju', icon: '🔵' },
        ];

        const CATEGORIES = ['Animals', 'Food', 'Daily', 'Clothing', 'Colors', 'Numbers', 'Greetings'];

        // --- COMPONENTS ---

        const Background = ({ theme }) => (
            <div className={`fixed inset-0 z-[-1] ${theme.bgGradient} transition-colors duration-1000 overflow-hidden`}>
                {theme.bgIcons.map((icon, i) => (
                    <div key={i} className="bg-icon text-4xl" style={{top: `${Math.random()*100}%`, left: `${Math.random()*100}%`, animationDelay: `${Math.random()*5}s`, fontSize: `${Math.random()*2+1}rem`}}>{icon}</div>
                ))}
            </div>
        );

        const App = () => {
            const [mode, setMode] = useState('landing');
            const [words, setWords] = useState([]);
            const [audioCache, setAudioCache] = useState({});
            const [currentTheme, setCurrentTheme] = useState('boy');
            const [stickers, setStickers] = useState([]);
            const [stats, setStats] = useState({ correct: 0, incorrect: 0, categories: {} });
            const [settings, setSettings] = useState({ autoPlayAudio: true, flashcardFront: 'english' });
            const [updateAvailable, setUpdateAvailable] = useState(null);
            const [updateLoading, setUpdateLoading] = useState(false);
            const [localVersion, setLocalVersion] = useState('none');

            useEffect(() => {
                const savedTheme = localStorage.getItem('littleLinguistTheme');
                if (savedTheme && THEMES[savedTheme]) setCurrentTheme(savedTheme);

                const savedWords = localStorage.getItem('littleLinguistWords_v3');
                if (savedWords) setWords(JSON.parse(savedWords));
                else { setWords(INITIAL_DATA); localStorage.setItem('littleLinguistWords_v3', JSON.stringify(INITIAL_DATA)); }

                const savedStickers = localStorage.getItem('ll_stickers');
                if(savedStickers) setStickers(JSON.parse(savedStickers));

                const savedStats = localStorage.getItem('ll_stats');
                if(savedStats) setStats(JSON.parse(savedStats));

                const savedSettings = localStorage.getItem('ll_settings');
                if(savedSettings) {
                    setSettings({ autoPlayAudio: true, flashcardFront: 'english', ...JSON.parse(savedSettings) });
                }

                // Check for remote update on every launch using tiny version.json only
                const storedVersion = localStorage.getItem('ll_words_version');
                const localVer = storedVersion || '0.0.0';
                setLocalVersion(storedVersion || 'none');
                fetch(REMOTE_VERSION_URL + '?t=' + Date.now())
                    .then(r => r.json())
                    .then(remote => {
                        if (remote.version && isNewer(localVer, remote.version)) {
                            setUpdateAvailable(remote.version); // just store the version string, not the full data
                        }
                    })
                    .catch(() => {});
            }, []);

            const applyUpdate = async () => {
                if (!updateAvailable) return;
                setUpdateLoading(true);
                try {
                    const res = await fetch(REMOTE_WORDS_URL + '?t=' + Date.now());
                    const data = await res.json();

                    // Always update words (text only, tiny)
                    if (data.words) {
                        setWords(data.words);
                        localStorage.setItem('littleLinguistWords_v3', JSON.stringify(data.words));
                    }

                    if (data.audio) {
                        // Load stored hashes to compare against
                        const storedHashes = JSON.parse(localStorage.getItem('ll_audio_hashes') || '{}');
                        const newHashes = { ...storedHashes };
                        const toWrite = {};
                        let unchanged = 0;

                        for (const [key, entry] of Object.entries(data.audio)) {
                            const remoteHash = entry.hash;
                            if (remoteHash && storedHashes[key] === remoteHash) {
                                unchanged++;
                                continue; // skip — nothing changed
                            }
                            toWrite[key] = entry;
                            newHashes[key] = remoteHash || '';
                        }

                        console.log('Audio: ' + Object.keys(toWrite).length + ' new/changed, ' + unchanged + ' skipped');

                        if (Object.keys(toWrite).length > 0) {
                            await batchSaveAudio(toWrite);
                            // Refresh audio cache for updated keys only
                            const newCache = { ...audioCache };
                            for (const key of Object.keys(toWrite)) {
                                const blob = await getAudioBlob(key);
                                if (blob) newCache[key] = URL.createObjectURL(blob);
                            }
                            setAudioCache(newCache);
                        }

                        localStorage.setItem('ll_audio_hashes', JSON.stringify(newHashes));
                    }

                    localStorage.setItem('ll_words_version', updateAvailable);
                    setLocalVersion(updateAvailable);
                    setUpdateAvailable(null);
                } catch(e) { alert('Update failed: ' + e.message); }
                setUpdateLoading(false);
            };

            useEffect(() => { if(words.length) localStorage.setItem('littleLinguistWords_v3', JSON.stringify(words)); }, [words]);
            useEffect(() => localStorage.setItem('littleLinguistTheme', currentTheme), [currentTheme]);
            useEffect(() => localStorage.setItem('ll_stickers', JSON.stringify(stickers)), [stickers]);
            useEffect(() => localStorage.setItem('ll_stats', JSON.stringify(stats)), [stats]);
            useEffect(() => localStorage.setItem('ll_settings', JSON.stringify(settings)), [settings]);

            const changeTheme = (themeId) => setCurrentTheme(themeId);
            const theme = THEMES[currentTheme];

            const handleAudioPlay = async (wordId, lang) => {
                const audioKey = `${wordId}_${lang}`;
                if (audioCache[audioKey]) {
                    new Audio(audioCache[audioKey]).play().catch(e => console.log(e));
                    return;
                }
                try {
                    const blob = await getAudioBlob(audioKey);
                    if (blob) {
                        const url = URL.createObjectURL(blob);
                        setAudioCache(prev => ({ ...prev, [audioKey]: url }));
                        new Audio(url).play().catch(e => console.log(e));
                    } else if ('speechSynthesis' in window && lang === 'english') {
                         // Fallback for English
                         const u = new SpeechSynthesisUtterance(words.find(w=>w.id===wordId)?.english || "");
                         window.speechSynthesis.speak(u);
                    }
                } catch (e) { console.error(e); }
            };

            const clearAudioCache = (wordId, lang) => {
                const audioKey = `${wordId}_${lang}`;
                setAudioCache(prev => {
                    const newState = { ...prev };
                    delete newState[audioKey];
                    return newState;
                });
            };

            const updateStats = (isCorrect, category) => {
                setStats(prev => {
                    const newStats = { ...prev };
                    if(isCorrect) {
                        newStats.correct++;
                        newStats.categories[category] = (newStats.categories[category] || 0) + 1;
                    } else { newStats.incorrect++; }
                    return newStats;
                });
            };

            return (
                <div className="min-h-screen relative font-sans text-gray-800">
                    <Background theme={theme} />
                    {updateAvailable && (
                        <div className="fixed top-0 left-0 right-0 z-50 bg-yellow-400 text-yellow-900 px-4 py-3 flex items-center justify-between gap-3 shadow-md">
                            <span className="font-bold text-sm">📦 New word pack available (v{updateAvailable})</span>
                            <button onClick={applyUpdate} disabled={updateLoading}
                                className="bg-yellow-900 text-yellow-100 px-4 py-1.5 rounded-full font-bold text-xs hover:bg-yellow-800 transition-colors shrink-0">
                                {updateLoading ? 'Downloading...' : 'Update Now'}
                            </button>
                        </div>
                    )}
                    <div className={`relative z-10 pb-8 ${updateAvailable ? 'pt-14' : ''}`}>
                        {mode === 'landing' && <Landing setMode={setMode} theme={theme} changeTheme={changeTheme} currentTheme={currentTheme} stickers={stickers} />}
                        {mode === 'parent' && <ParentManager words={words} setWords={setWords} playAudio={handleAudioPlay} clearCache={clearAudioCache} theme={theme} currentTheme={currentTheme} changeTheme={changeTheme} stats={stats} settings={settings} setSettings={setSettings} localVersion={localVersion} setLocalVersion={setLocalVersion} onBack={() => setMode('landing')} />}
                        {mode === 'kid_dashboard' && <KidZone words={words} audioCache={audioCache} playAudio={handleAudioPlay} setMode={setMode} theme={theme} stickers={stickers} setStickers={setStickers} stats={stats} updateStats={updateStats} settings={settings} />}
                    </div>
                </div>
            );
        };

        const Landing = ({ setMode, theme, changeTheme, currentTheme, stickers }) => {
            const [challenge, setChallenge] = useState(null);
            const [answer, setAnswer] = useState('');
            const [installPrompt, setInstallPrompt] = useState(null);
            const [installed, setInstalled] = useState(false);

            useEffect(() => {
                const handler = (e) => { e.preventDefault(); setInstallPrompt(e); };
                window.addEventListener('beforeinstallprompt', handler);
                window.addEventListener('appinstalled', () => setInstalled(true));
                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);

            const handleInstall = async () => {
                if (!installPrompt) return;
                installPrompt.prompt();
                const { outcome } = await installPrompt.userChoice;
                if (outcome === 'accepted') setInstalled(true);
                setInstallPrompt(null);
            };
            const startChallenge = () => {
                const n1 = Math.floor(Math.random() * 5) + 1;
                const n2 = Math.floor(Math.random() * 4) + 1;
                setChallenge({ q: `${n1} + ${n2}`, a: (n1 + n2).toString() });
                setAnswer('');
            };
            const verify = () => {
                if (answer.trim() === challenge.a) { setChallenge(null); setMode('parent'); }
                else { alert("Oops! Try again."); setAnswer(''); }
            };

            const floatingEmojis = ['🌟','🎈','🦁','🌈','🎵','🐘','🦋','🌸','⭐','🎉'];

            return (
                <div className="relative min-h-screen flex flex-col items-center justify-between overflow-hidden"
                    style={{background: 'linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%)'}}>

                    {floatingEmojis.map((emoji, i) => (
                        <div key={i} className="absolute text-4xl pointer-events-none animate-float opacity-40"
                            style={{left: (i * 10 + 3) + '%', top: (i % 2 === 0 ? 5 : 55) + '%', animationDelay: (i * 0.7) + 's', animationDuration: (6 + i * 0.5) + 's', fontSize: (2 + (i % 3) * 0.5) + 'rem'}}>
                            {emoji}
                        </div>
                    ))}

                    <div className="absolute top-4 right-4 z-20 flex flex-col items-end gap-2">
                        <button onClick={startChallenge} className="w-10 h-10 bg-white/20 hover:bg-white/30 rounded-full flex items-center justify-center text-white/60 hover:text-white transition-all text-lg">⚙️</button>
                        <div className="flex gap-1">
                            <button onClick={() => changeTheme('boy')} className={`w-8 h-8 rounded-full border-2 flex items-center justify-center text-sm transition-all ${currentTheme === 'boy' ? 'border-white bg-white/30 scale-110' : 'border-white/30 bg-white/10'}`}>👦</button>
                            <button onClick={() => changeTheme('girl')} className={`w-8 h-8 rounded-full border-2 flex items-center justify-center text-sm transition-all ${currentTheme === 'girl' ? 'border-white bg-white/30 scale-110' : 'border-white/30 bg-white/10'}`}>👧</button>
                        </div>
                    </div>

                    <div className="flex flex-col items-center justify-center flex-1 px-6 py-12 gap-8 z-10">
                        <div className="text-center">
                            <div className="text-7xl mb-2 animate-bounce-slow">🌍</div>
                            <h1 className="text-5xl font-black text-white drop-shadow-lg mb-1">Little Linguist</h1>
                            <p className="text-white/80 font-bold text-lg">Let's learn together!</p>
                        </div>

                        <button onClick={() => setMode('kid_dashboard')}
                            className="w-full max-w-xs py-10 rounded-[2.5rem] font-black text-4xl text-white flex flex-col items-center gap-3 transition-all active:scale-95"
                            style={{background: 'linear-gradient(to bottom, #f9a825, #f57f17)', boxShadow: '0 10px 0 #e65100, 0 12px 20px rgba(0,0,0,0.3)'}}>
                            <span className="text-6xl">{currentTheme === 'girl' ? '👧🏾' : '👦🏾'}</span>
                            Let's Play!
                        </button>

                        {stickers.length > 0 && (
                            <div className="bg-white/20 backdrop-blur px-5 py-2 rounded-full text-white font-bold text-lg">

                        {!installed && installPrompt && (
                            <button onClick={handleInstall} className="flex items-center gap-2 bg-white/20 backdrop-blur border border-white/30 px-5 py-3 rounded-full text-white font-bold text-sm hover:bg-white/30 transition-all">
                                📲 Install App
                            </button>
                        )}
                    </div>

                    <div className="z-10 pb-4 text-white/40 text-xs font-medium tracking-widest">v1.9.1</div>

                    {challenge && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
                            <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-xs text-center mx-4">
                                <div className="text-4xl mb-3">🔒</div>
                                <h3 className="text-xl font-bold text-gray-800 mb-1">Parents Only</h3>
                                <p className="text-gray-500 mb-5 font-medium">What is {challenge.q}?</p>
                                <input type="number" value={answer} onChange={e => setAnswer(e.target.value)}
                                    onKeyDown={(e) => { if (e.key === 'Enter') verify(); }}
                                    className="w-full bg-gray-50 border-2 border-gray-200 rounded-xl p-4 text-center text-2xl font-bold mb-4 focus:border-blue-400 focus:outline-none"
                                    placeholder="?" autoFocus />
                                <div className="flex gap-3">
                                    <button onClick={() => setChallenge(null)} className="flex-1 py-3 rounded-xl font-bold text-gray-500 hover:bg-gray-100 transition-colors">Cancel</button>
                                    <button onClick={verify} className="flex-1 bg-blue-600 py-3 rounded-xl font-bold text-white hover:bg-blue-700 shadow-lg transition-colors">Enter</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const LibraryStats = ({ words }) => {
            const [audioCounts, setAudioCounts] = useState({ yoruba: 0, gungbe: 0 });

            useEffect(() => {
                getAllAudioEntries().then(entries => {
                    const keys = Object.keys(entries);
                    setAudioCounts({
                        yoruba: keys.filter(k => k.endsWith('_yoruba')).length,
                        gungbe: keys.filter(k => k.endsWith('_gungbe')).length,
                    });
                }).catch(() => {});
            }, [words]);

            const stats = [
                { label: 'Total Words', value: words.length, colour: 'blue', icon: '📚' },
                { label: 'Yoruba Audio', value: audioCounts.yoruba, colour: 'green', icon: '🎙️' },
                { label: 'Gungbe Audio', value: audioCounts.gungbe, colour: 'purple', icon: '🎙️' },
            ];

            return (
                <div className="bg-white rounded-2xl shadow-sm p-4 border border-gray-100">
                    <h2 className="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
                        <Icon name="BarChart" className="text-blue-500" /> Library
                    </h2>
                    <div className="grid grid-cols-3 gap-3">
                        {stats.map(({ label, value, colour, icon }) => (
                            <div key={label} className={'bg-' + colour + '-50 rounded-xl p-3 text-center border border-' + colour + '-100'}>
                                <div className="text-xl mb-1">{icon}</div>
                                <div className={'text-2xl font-black text-' + colour + '-600 mb-1'}>{value}</div>
                                <div className={'text-xs font-bold text-' + colour + '-800 opacity-70 leading-tight'}>{label}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ParentManager = ({ words, setWords, playAudio, clearCache, theme, currentTheme, changeTheme, stats, settings, setSettings, localVersion, setLocalVersion, onBack }) => {
            const [view, setView] = useState('words');
            const [newWord, setNewWord] = useState({ english: '', yoruba: '', gungbe: '', category: 'Animals', icon: '❓' });
            
            // Inline editing state
            const [editingId, setEditingId] = useState(null);
            const [editForm, setEditForm] = useState(null);
            const [deleteConfirmationId, setDeleteConfirmationId] = useState(null);

            const [filter, setFilter] = useState('All');
            const [searchTerm, setSearchTerm] = useState('');
            const [exporting, setExporting] = useState(false);
            const fileInputRef = useRef(null);

            const categories = ['All', ...CATEGORIES];

            const handleAddWord = () => {
                if (!newWord.english) return;
                const id = Date.now().toString();
                setWords([{ ...newWord, id }, ...words]);
                setNewWord({ english: '', yoruba: '', gungbe: '', category: 'Animals', icon: '❓' });
            };

            const startEdit = (word) => { 
                setEditingId(word.id);
                setEditForm({ ...word });
                setDeleteConfirmationId(null);
            };

            const saveEdit = () => {
                setWords(words.map(w => w.id === editingId ? editForm : w));
                setEditingId(null);
                setEditForm(null);
            };

            const cancelEdit = () => {
                setEditingId(null);
                setEditForm(null);
            };

            const requestDelete = (id) => {
                setDeleteConfirmationId(id);
                setEditingId(null);
            };

            const confirmDelete = (id) => {
                setWords(words.filter(w => w.id !== id));
                setDeleteConfirmationId(null);
            };

            const cancelDelete = () => {
                setDeleteConfirmationId(null);
            };


            const handleBackup = async () => { 
                setExporting(true);
                try {
                    const audioEntries = await getAllAudioEntries();
                    const audioWithHashes = {};
                    for (const [key, blob] of Object.entries(audioEntries)) {
                        const base64 = await blobToBase64(blob);
                        const hash = await hashString(base64);
                        audioWithHashes[key] = { data: base64, hash };
                    }
                    const currentVersion = localStorage.getItem('ll_words_version') || '0.0.0';
                    const newVersion = incrementVersion(currentVersion);
                    localStorage.setItem('ll_words_version', newVersion);
                    setLocalVersion(newVersion);

                    // Also update stored hashes locally so next export is accurate
                    const hashes = {};
                    for (const [key, entry] of Object.entries(audioWithHashes)) hashes[key] = entry.hash;
                    localStorage.setItem('ll_audio_hashes', JSON.stringify(hashes));

                    // Download words.json
                    const backupData = { words, audio: audioWithHashes, version: newVersion, timestamp: new Date().toISOString() };
                    const blob = new Blob([JSON.stringify(backupData)], {type: 'application/json'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'words.json'; a.click();

                    // Download version.json
                    const versionData = { version: newVersion, timestamp: new Date().toISOString() };
                    const vBlob = new Blob([JSON.stringify(versionData)], {type: 'application/json'});
                    const vUrl = URL.createObjectURL(vBlob);
                    const vA = document.createElement('a');
                    vA.href = vUrl; vA.download = 'version.json'; vA.click();
                } catch (e) { alert('Export failed: ' + e.message); }
                setExporting(false);
            };

            const handleExportAudioOnly = async () => {
                setExporting(true);
                try {
                    const audioEntries = await getAllAudioEntries();
                    const audioKeys = Object.keys(audioEntries);
                    // Only include words that have at least one audio recording
                    const wordsWithAudio = words.filter(w =>
                        audioKeys.some(k => k.startsWith(w.id + '_'))
                    );
                    const audioWithHashes = {};
                    for (const key of audioKeys) {
                        const blob = audioEntries[key];
                        const base64 = await blobToBase64(blob);
                        const hash = await hashString(base64);
                        audioWithHashes[key] = { data: base64, hash };
                    }
                    const currentVersion = localStorage.getItem('ll_words_version') || '0.0.0';
                    const exportData = {
                        words: wordsWithAudio,
                        audio: audioWithHashes,
                        version: currentVersion,
                        timestamp: new Date().toISOString(),
                        exportType: 'audio-only'
                    };
                    const blob = new Blob([JSON.stringify(exportData)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'words-with-audio.json';
                    a.click();
                } catch (e) { alert('Export failed: ' + e.message); }
                setExporting(false);
            };

            const handleRestore = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.words) {
                            setWords(data.words);
                            localStorage.setItem('littleLinguistWords_v3', JSON.stringify(data.words));
                        }
                        if (data.audio) {
                            const hashes = {};
                            for (const [key, entry] of Object.entries(data.audio)) {
                                // Support both old format (plain base64) and new format ({data, hash})
                                const base64 = typeof entry === 'string' ? entry : entry.data;
                                const hash = typeof entry === 'string' ? '' : (entry.hash || '');
                                const blob = await base64ToBlob(base64);
                                await saveAudioBlob(key, blob);
                                hashes[key] = hash;
                            }
                            localStorage.setItem('ll_audio_hashes', JSON.stringify(hashes));
                        }
                        if (data.version) {
                            localStorage.setItem('ll_words_version', data.version);
                            setLocalVersion(data.version);
                        }
                        alert('Backup restored!');
                    } catch (err) { alert('Error reading backup: ' + err.message); }
                };
                reader.readAsText(file);
            };

            const handleHardRefresh = async () => {
                try {
                    if ('serviceWorker' in navigator) {
                        const registrations = await navigator.serviceWorker.getRegistrations();
                        for (const reg of registrations) {
                            await reg.unregister();
                        }
                    }
                    if ('caches' in window) {
                        const keys = await caches.keys();
                        await Promise.all(keys.map(k => caches.delete(k)));
                    }
                } catch(e) { console.error(e); }
                window.location.reload(true);
            };

            const handleReset = async () => { 
                 if (confirm("⚠️ ARE YOU SURE? This will delete all words.")) {
                    localStorage.removeItem('littleLinguistWords_v3'); setWords(INITIAL_DATA);
                    try { const db = await initDB(); const t = db.transaction([STORE_NAME], 'readwrite'); t.objectStore(STORE_NAME).clear(); alert("Reset complete."); } catch(e) { console.error(e); }
                }
            };

            const filteredWords = words.filter(w => filter === 'All' ? true : w.category === filter).filter(w => w.english.toLowerCase().includes(searchTerm.toLowerCase()));

            return (
                <div className="max-w-4xl mx-auto p-4 space-y-4">
                    <div className="flex items-center gap-3 mb-2">
                        <button onClick={onBack} className="bg-white p-3 rounded-full shadow text-gray-500 hover:bg-gray-50 transition-all">🏠</button>
                        <h1 className="text-xl font-black text-gray-700">Parent Zone 🛠️</h1>
                    </div>
                    <div className="flex gap-2 mb-4 bg-white p-2 rounded-xl shadow-sm">
                        <button onClick={() => setView('words')} className={`flex-1 py-2 rounded-lg font-bold ${view === 'words' ? 'bg-blue-100 text-blue-700' : 'text-gray-500'}`}>Words</button>
                        <button onClick={() => setView('stats')} className={`flex-1 py-2 rounded-lg font-bold ${view === 'stats' ? 'bg-purple-100 text-purple-700' : 'text-gray-500'}`}>Stats</button>
                        <button onClick={() => setView('settings')} className={`flex-1 py-2 rounded-lg font-bold ${view === 'settings' ? 'bg-gray-100 text-gray-700' : 'text-gray-500'}`}>Settings</button>
                    </div>

                    {view === 'settings' && (
                        <div className="space-y-4 animate-pop">
                            <LibraryStats words={words} />
                            <div className="bg-white rounded-2xl shadow-sm p-4 border border-gray-100">
                                <h2 className="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2"><Icon name="Download" className="text-blue-500" /> Data</h2>
                                <div className="flex items-center justify-between mb-3 bg-gray-50 px-3 py-2 rounded-lg">
                                    <span className="text-sm font-bold text-gray-500">Data Pack Version</span>
                                    <span className="text-sm font-black text-blue-600">{localVersion === 'none' ? 'No pack installed' : 'v' + localVersion}</span>
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                    <button onClick={handleBackup} disabled={exporting} className="bg-blue-50 text-blue-600 p-2 rounded-lg border border-blue-100 font-bold hover:bg-blue-100 flex items-center justify-center gap-1 text-xs"><Icon name="FileJson" size={16}/> {exporting ? '...' : 'Backup'}</button>
                                    <div className="relative"><input type="file" ref={fileInputRef} onChange={handleRestore} accept=".json" className="hidden" /><button onClick={() => fileInputRef.current.click()} className="w-full h-full bg-green-50 text-green-600 p-2 rounded-lg border border-green-100 font-bold hover:bg-green-100 flex items-center justify-center gap-1 text-xs"><Icon name="Upload" size={16}/> Restore</button></div>
                                    <button onClick={handleReset} className="bg-red-50 text-red-600 p-2 rounded-lg border border-red-100 font-bold hover:bg-red-100 flex items-center justify-center gap-1 text-xs"><Icon name="RotateCcw" size={16}/> Reset</button>
                                </div>
                                <div className="grid grid-cols-2 gap-2 mt-2">
                                    <button onClick={handleExportAudioOnly} disabled={exporting} className="bg-purple-50 text-purple-600 p-2 rounded-lg border border-purple-100 font-bold hover:bg-purple-100 flex items-center justify-center gap-1 text-xs"><Icon name="Download" size={16}/> {exporting ? '...' : 'Export Words w/ Audio'}</button>
                                    <button onClick={handleHardRefresh} className="bg-orange-50 text-orange-600 p-2 rounded-lg border border-orange-100 font-bold hover:bg-orange-100 flex items-center justify-center gap-1 text-xs"><Icon name="RotateCcw" size={16}/> Hard Refresh</button>
                                </div>
                            </div>
                            <div className="bg-white rounded-2xl shadow-sm p-4 border border-gray-100">
                                <h2 className="text-lg font-bold text-gray-800 mb-2 flex items-center gap-2"><Icon name="Palette" className="text-purple-500" /> Theme</h2>
                                <div className="flex gap-2">
                                    {Object.values(THEMES).map(t => (
                                        <button key={t.id} onClick={() => changeTheme(t.id)} className={`flex-1 p-2 rounded-lg border-2 transition-all flex items-center justify-center gap-2 ${currentTheme === t.id ? `border-${t.primary.split('-')[1]}-500 bg-gray-50` : 'border-transparent bg-gray-100 hover:bg-gray-200'}`}>
                                            <span className="text-xl">{t.bgIcons[0]}</span><span className="font-bold text-gray-700 text-sm">{t.name}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-white rounded-2xl shadow-sm p-4 border border-gray-100">
                                <h2 className="text-lg font-bold text-gray-800 mb-2 flex items-center gap-2"><Icon name="Volume2" className="text-green-500" /> Preferences</h2>
                                <div className="space-y-4">
                                    <div className="flex items-center justify-between">
                                        <span className="text-gray-600">Auto-play audio</span>
                                        <button onClick={() => setSettings({...settings, autoPlayAudio: !settings.autoPlayAudio})} className={`w-12 h-6 rounded-full transition-colors relative ${settings.autoPlayAudio ? 'bg-green-500' : 'bg-gray-300'}`}>
                                            <div className={`absolute top-1 left-1 w-4 h-4 bg-white rounded-full transition-transform ${settings.autoPlayAudio ? 'translate-x-6' : ''}`}></div>
                                        </button>
                                    </div>
                                    <div className="flex items-center justify-between">
                                        <span className="text-gray-600">Flashcard Front</span>
                                        <div className="flex bg-gray-100 rounded-lg p-1">
                                            <button 
                                                onClick={() => setSettings({...settings, flashcardFront: 'english'})}
                                                className={`px-3 py-1 rounded-md text-xs font-bold transition-all ${settings.flashcardFront === 'english' ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-400'}`}
                                            >
                                                English
                                            </button>
                                            <button 
                                                onClick={() => setSettings({...settings, flashcardFront: 'native'})}
                                                className={`px-3 py-1 rounded-md text-xs font-bold transition-all ${settings.flashcardFront === 'native' ? 'bg-white text-gray-800 shadow-sm' : 'text-gray-400'}`}
                                            >
                                                Native
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'stats' && (
                        <div className="space-y-4 animate-pop">
                            <div className="bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
                                <div className="grid grid-cols-2 gap-4 mb-6">
                                    <div className="bg-green-50 p-4 rounded-2xl text-center"><div className="text-4xl font-bold text-green-600 mb-1">{stats.correct}</div><div className="text-sm font-bold text-green-800 opacity-60">Correct</div></div>
                                    <div className="bg-orange-50 p-4 rounded-2xl text-center"><div className="text-4xl font-bold text-orange-600 mb-1">{stats.incorrect}</div><div className="text-sm font-bold text-orange-800 opacity-60">Mistakes</div></div>
                                </div>
                                <h3 className="font-bold text-gray-600 mb-3">Top Categories</h3>
                                <div className="space-y-2">
                                    {Object.entries(stats.categories).sort((a,b) => b[1] - a[1]).slice(0, 5).map(([cat, count]) => (
                                        <div key={cat} className="flex justify-between items-center bg-gray-50 p-3 rounded-lg"><span className="font-medium text-gray-700">{cat}</span><span className="font-bold text-blue-600">{count} correct</span></div>
                                    ))}
                                    {Object.keys(stats.categories).length === 0 && (
                                        <div className="text-center text-gray-400 italic py-4">Play games to see stats!</div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'words' && (
                        <div className="bg-white rounded-2xl shadow-sm p-4 border border-gray-100 animate-pop">
                            <div id="edit-form" className="grid grid-cols-6 gap-2 mb-4 bg-gray-50 p-2 rounded-lg">
                                <input placeholder="Icon" value={newWord.icon} onChange={e => setNewWord({...newWord, icon: e.target.value})} className="p-2 rounded border w-full text-center" />
                                <input placeholder="English" value={newWord.english} onChange={e => setNewWord({...newWord, english: e.target.value})} className="p-2 rounded border w-full" />
                                <input placeholder="Yoruba" value={newWord.yoruba} onChange={e => setNewWord({...newWord, yoruba: e.target.value})} className="p-2 rounded border w-full" />
                                <input placeholder="Gungbe" value={newWord.gungbe} onChange={e => setNewWord({...newWord, gungbe: e.target.value})} className="p-2 rounded border w-full" />
                                <select value={newWord.category} onChange={e => setNewWord({...newWord, category: e.target.value})} className="p-2 rounded border w-full">{CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                <button onClick={handleAddWord} className="bg-green-500 text-white rounded font-bold p-2 hover:bg-green-600">Add</button>
                            </div>
                            <input type="text" placeholder="Search..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full p-2 border rounded-lg mb-2" />
                            <div className="flex gap-2 overflow-x-auto pb-2 mb-2 no-scrollbar">{categories.map(cat => <button key={cat} onClick={() => setFilter(cat)} className={`px-3 py-1 rounded-full text-xs font-bold ${filter === cat ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-600'}`}>{cat}</button>)}</div>
                            <div className="space-y-2">
                                {filteredWords.map(word => {
                                    const isEditing = editingId === word.id;
                                    const isDeleting = deleteConfirmationId === word.id;

                                    if (isEditing) {
                                        return (
                                            <div key={word.id} className="grid grid-cols-1 md:grid-cols-6 gap-2 bg-blue-50 p-2 rounded border-2 border-blue-200 shadow-sm items-center">
                                                <input value={editForm.icon} onChange={e => setEditForm({...editForm, icon: e.target.value})} className="p-2 rounded border text-center" placeholder="Icon" />
                                                <input value={editForm.english} onChange={e => setEditForm({...editForm, english: e.target.value})} className="p-2 rounded border" placeholder="English" />
                                                <input value={editForm.yoruba} onChange={e => setEditForm({...editForm, yoruba: e.target.value})} className="p-2 rounded border" placeholder="Yoruba" />
                                                <input value={editForm.gungbe} onChange={e => setEditForm({...editForm, gungbe: e.target.value})} className="p-2 rounded border" placeholder="Gungbe" />
                                                <select value={editForm.category} onChange={e => setEditForm({...editForm, category: e.target.value})} className="p-2 rounded border">{CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                                <div className="flex gap-1 justify-end">
                                                    <button onClick={saveEdit} className="bg-green-500 text-white p-2 rounded hover:bg-green-600"><Icon name="Save" size={16}/></button>
                                                    <button onClick={cancelEdit} className="bg-gray-400 text-white p-2 rounded hover:bg-gray-500"><Icon name="X" size={16}/></button>
                                                </div>
                                            </div>
                                        );
                                    }

                                    return (
                                        <div key={word.id} className="flex items-center justify-between bg-white p-2 rounded border shadow-sm">
                                            <div className="flex items-center gap-3 overflow-hidden">
                                                <span className="text-2xl min-w-[30px] text-center">{word.icon}</span>
                                                <div className="truncate">
                                                    <div className="font-bold truncate">{word.english}</div>
                                                    <div className="text-xs text-gray-500 truncate">{word.yoruba} • {word.gungbe}</div>
                                                </div>
                                            </div>
                                            <div className="flex gap-2 shrink-0">
                                                 {!isDeleting && (
                                                     <>
                                                        <VoiceRecorder wordId={word.id} lang="yoruba" textToSpeak={word.yoruba} playAudio={playAudio} onRecordComplete={() => clearCache(word.id, 'yoruba')} label="Y"/>
                                                        <VoiceRecorder wordId={word.id} lang="gungbe" textToSpeak={word.gungbe} playAudio={playAudio} onRecordComplete={() => clearCache(word.id, 'gungbe')} label="G"/>
                                                        <button onClick={() => startEdit(word)} className="text-blue-400 p-2 hover:bg-blue-50 rounded"><Icon name="Edit" size={16}/></button>
                                                        <button onClick={() => requestDelete(word.id)} className="text-red-400 p-2 hover:bg-red-50 rounded"><Icon name="Trash2" size={16}/></button>
                                                     </>
                                                 )}
                                                 {isDeleting && (
                                                     <div className="flex items-center gap-2 bg-red-50 px-2 rounded">
                                                         <span className="text-xs font-bold text-red-500">Delete?</span>
                                                         <button onClick={() => confirmDelete(word.id)} className="text-green-600 p-1 hover:bg-green-100 rounded"><Icon name="Check" size={16}/></button>
                                                         <button onClick={cancelDelete} className="text-gray-500 p-1 hover:bg-gray-200 rounded"><Icon name="X" size={16}/></button>
                                                     </div>
                                                 )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const VoiceRecorder = ({ wordId, lang, textToSpeak, playAudio, onRecordComplete, label }) => {
             const [isRecording, setIsRecording] = useState(false);
             const [hasRec, setHasRec] = useState(false);
             const mediaRecorder = useRef(null);

             useEffect(() => { getAudioBlob(`${wordId}_${lang}`).then(b => { if(b) setHasRec(true); }); }, [wordId, lang]);

             const toggleRec = async () => {
                 if (isRecording) { mediaRecorder.current.stop(); setIsRecording(false); } 
                 else {
                     try {
                         const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                         mediaRecorder.current = new MediaRecorder(stream);
                         const chunks = [];
                         mediaRecorder.current.ondataavailable = e => chunks.push(e.data);
                         mediaRecorder.current.onstop = async () => {
